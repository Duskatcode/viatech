services:
  postgres:
    image: postgres:16
    container_name: biomed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biomed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biomed_password}
      POSTGRES_DB: ${POSTGRES_DB:-biomed_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - biomed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biomed} -d ${POSTGRES_DB:-biomed_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  biomed_postgres_data:
